<svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!--
    OpenGSC logomark — Apple-style minimal SEO icon
    Concept: magnifying glass with ascending bar chart inside
    Search + Growth = SEO Analytics
    Uses currentColor — adapts to any nav background
  -->
  <defs>
    <clipPath id="lens">
      <circle cx="11" cy="11" r="8"/>
    </clipPath>
  </defs>

  <!-- Handle — 45° classic magnifying glass angle -->
  <line
    x1="17" y1="17"
    x2="25.5" y2="25.5"
    stroke="currentColor"
    stroke-width="2.5"
    stroke-linecap="round"
  />

  <!-- Lens ring -->
  <circle
    cx="11" cy="11" r="8"
    stroke="currentColor"
    stroke-width="2"
  />

  <!-- Ascending bar chart (SEO rankings going up) clipped to lens -->
  <g clip-path="url(#lens)" fill="currentColor">
    <!-- Short bar — left position -->
    <rect x="4.5"  y="15"  width="2.5" height="12" rx="1.1"/>
    <!-- Medium bar — center position -->
    <rect x="8.5"  y="11"  width="2.5" height="16" rx="1.1"/>
    <!-- Tall bar — right position (the upward trend leader) -->
    <rect x="12.5" y="7"   width="2.5" height="20" rx="1.1"/>
  </g>
</svg>
