<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="f">
      <circle cx="13" cy="13" r="9"/>
    </clipPath>
  </defs>

  <!-- Rounded square — Apple blue background -->
  <rect width="32" height="32" rx="7" fill="#0066cc"/>

  <!-- Handle -->
  <line x1="20" y1="20" x2="28.5" y2="28.5"
        stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Lens ring -->
  <circle cx="13" cy="13" r="9"
          stroke="white" stroke-width="2.5" fill="none"/>

  <!-- Ascending bars clipped to lens -->
  <g clip-path="url(#f)" fill="white">
    <rect x="6"   y="17"   width="3" height="14" rx="1.3"/>
    <rect x="11"  y="12.5" width="3" height="18.5" rx="1.3"/>
    <rect x="16"  y="8"    width="3" height="23" rx="1.3"/>
  </g>
</svg>
