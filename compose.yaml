# OpenGSC — Docker Compose deployment.
# 1) cp .env.template .env  and fill in NEXTAUTH_SECRET, NEXTAUTH_URL, GOOGLE_CLIENT_ID/SECRET
#    (DATABASE_URL is set by the container — leave it out or it will be overridden below)
# 2) docker compose up -d
# 3) open http://localhost:3000  (or your domain behind a reverse proxy)
#
# The SQLite database lives in the named volume `opengsc-data` and survives
# updates: git pull && docker compose up -d --build

services:
  opengsc:
    build: .
    # Or use a prebuilt image instead of build:
    # image: ghcr.io/fenjo26/opengsc:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Inside the container the DB always lives on the volume — overrides .env
      DATABASE_URL: "file:/data/prod.db"
    volumes:
      - opengsc-data:/data

volumes:
  opengsc-data:
